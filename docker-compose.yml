services:
  db-server:
    image: postgres:15
    environment: 
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"        # expose to host machine
    volumes:
      - my-db-data:/var/lib/postgresql/data  # Moved here! ✅

  web-server:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html

volumes:
  my-db-data:  # Docker creates this automatically
